name: Build pai-memory-api

on:
  push:
    branches: [main]
    paths:
      - 'Packs/pai-memory/**'
      - '.github/workflows/pai-memory-api.yaml'
  workflow_dispatch:

jobs:
  build:
    uses: escape-velocity-ventures/workflow-templates/.github/workflows/reusable-container-build.yml@main
    with:
      image-name: pai-memory-api
      context: Packs/pai-memory
      dockerfile: Packs/pai-memory/Dockerfile
    secrets: inherit
